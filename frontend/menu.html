<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant Menu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1 id="restaurant-name">Restaurant Menu</h1>
    <p id="restaurant-info"></p>
    <a href="index.html">← Back</a>
  </header>

  <main>
    <div id="menu-items"></div>
  </main>

  <script>
    fetch("https://multi-restaurant-menu.onrender.com/restaurants")
      .then(response => response.json())
      .then(data => {
        const selectedId = localStorage.getItem("selectedRestaurantId");
        const restaurant = data.find(r => r.id == selectedId);

        if (!restaurant) {
          document.getElementById("menu-items").innerHTML = "<p>No menu found.</p>";
          return;
        }

        document.getElementById("restaurant-name").textContent = restaurant.name;
        document.getElementById("restaurant-info").textContent =
          restaurant.type + " - " + restaurant.location;

        const menuContainer = document.getElementById("menu-items");

        restaurant.menu.forEach(item => {
          const div = document.createElement("div");
          div.className = "menu-category";
          div.innerHTML = `
            <h3>${item.category}</h3>
            <p>${item.name} - ₹${item.price}</p>
          `;
          menuContainer.appendChild(div);
        });
      })
      .catch(error => {
        console.error("Error:", error);
      });
  </script>
</body>
</html>
