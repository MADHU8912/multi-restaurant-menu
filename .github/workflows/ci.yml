name: Food App CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show files
        run: ls -la

      - name: Build report file
        run: |
          echo "Build started" > build-report.txt
          echo "Repository: $GITHUB_REPOSITORY" >> build-report.txt
          echo "Branch: $GITHUB_REF_NAME" >> build-report.txt
          echo "Commit: $GITHUB_SHA" >> build-report.txt
          echo "Build finished successfully" >> build-report.txt

      - name: Upload build report
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build-report.txt

      - name: Prepare site files
        run: |
          mkdir public
          cp -r ./* public/ || true
          rm -rf public/.git public/.github || true

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  report:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build report
        uses: actions/download-artifact@v5
        with:
          name: build-report

      - name: Show build report
        run: cat build-report.txt

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
